name: Unrepost batch (beautyfan) manual

on:
  workflow_dispatch:
    inputs:
      max_actions:
        description: "Max deletes this run"
        required: true
        default: "2000"
      sleep_seconds:
        description: "Delay between deletes (seconds)"
        required: true
        default: "0.3"

concurrency:
  group: unrepost-bf-manual
  cancel-in-progress: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install atproto

      - name: Run unrepost batch (beautyfan)
        env:
          BSKY_USERNAME_BF: ${{ secrets.BSKY_USERNAME_BF }}
          BSKY_PASSWORD_BF: ${{ secrets.BSKY_PASSWORD_BF }}
          MAX_ACTIONS: ${{ inputs.max_actions }}
          SLEEP_SECONDS: ${{ inputs.sleep_seconds }}
        run: |
          python scripts/unrepost_batch_bf.py