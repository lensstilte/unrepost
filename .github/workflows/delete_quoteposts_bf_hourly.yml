name: Delete quote-posts (beautyfan) hourly

on:
  schedule:
    - cron: "0 * * * *"   # ieder uur op :00
  workflow_dispatch:

concurrency:
  group: delete-quoteposts-beautyfan
  cancel-in-progress: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install atproto

      - name: Delete quote-posts (beautyfan)
        env:
          BSKY_USERNAME_BF: ${{ secrets.BSKY_USERNAME_BF }}
          BSKY_PASSWORD_BF: ${{ secrets.BSKY_PASSWORD_BF }}
          MAX_ACTIONS: "2000"
          SLEEP_SECONDS: "0.3"
        run: |
          python scripts/delete_quoteposts_bf.py