name: Unrepost cleanup (NB) scheduled

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

concurrency:
  group: unrepost-nb
  cancel-in-progress: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install atproto
      - name: Unrepost batch (NB)
        env:
          BSKY_USERNAME: ${{ secrets.BSKY_USERNAME_NB }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD_NB }}
          MAX_ACTIONS: "2000"
          SLEEP_SECONDS: "0.3"
        run: |
          python scripts/unrepost_batch.py